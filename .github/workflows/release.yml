name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: graphiq-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: graphiq-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: graphiq-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          for bin in graphiq graphiq-mcp graphiq-bench; do
            if [ -f "target/${{ matrix.target }}/release/$bin" ]; then
              cp "target/${{ matrix.target }}/release/$bin" dist/
            fi
          done
          cd dist && tar czf "${{ matrix.artifact }}.tar.gz" *
          shasum -a 256 "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: macos-14

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
          generate_release_notes: true
