name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: graphiq-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: graphiq-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: graphiq-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build dependencies (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          for bin in graphiq graphiq-mcp graphiq-bench; do
            if [ -f "target/${{ matrix.target }}/release/$bin" ]; then
              cp "target/${{ matrix.target }}/release/$bin" dist/
            fi
          done
          cd dist && tar czf "${{ matrix.artifact }}.tar.gz" *
          shasum -a 256 "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.tar.gz
            dist/${{ matrix.artifact }}.sha256

  release:
    needs: build
    runs-on: macos-14

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
          generate_release_notes: true

  bump-homebrew:
    needs: release
    runs-on: ubuntu-22.04

    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download SHA256 files
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHAs
        id: shas
        run: |
          ARM64_SHA=$(cat artifacts/graphiq-aarch64-apple-darwin/graphiq-aarch64-apple-darwin.sha256 | awk '{print $1}')
          INTEL_SHA=$(cat artifacts/graphiq-x86_64-apple-darwin/graphiq-x86_64-apple-darwin.sha256 | awk '{print $1}')
          LINUX_SHA=$(cat artifacts/graphiq-x86_64-unknown-linux-gnu/graphiq-x86_64-unknown-linux-gnu.sha256 | awk '{print $1}')
          echo "arm64=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "intel=${INTEL_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux=${LINUX_SHA}" >> "$GITHUB_OUTPUT"

      - name: Update homebrew tap
        uses: actions/checkout@v4
        with:
          repository: aaf2tbz/homebrew-graphiq
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Write formula
        run: |
          cat > homebrew-tap/Formula/graphiq.rb <<FORMULA
          class Graphiq < Formula
            desc "Structural code intelligence — unified pipeline with BM25, spectral diffusion, holographic matching"
            homepage "https://github.com/aaf2tbz/graphiq"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/aaf2tbz/graphiq/releases/download/v#{version}/graphiq-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.shas.outputs.arm64 }}"
              end
              on_intel do
                url "https://github.com/aaf2tbz/graphiq/releases/download/v#{version}/graphiq-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.shas.outputs.intel }}"
              end
            end

            on_linux do
              url "https://github.com/aaf2tbz/graphiq/releases/download/v#{version}/graphiq-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.shas.outputs.linux }}"
            end

            def install
              bin.install "graphiq"
              bin.install "graphiq-mcp"
              bin.install "graphiq-bench"
            end

            test do
              system "#{bin}/graphiq", "--help"
            end
          end
          FORMULA

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/graphiq.rb
          git diff --cached --quiet || git commit -m "graphiq v${{ steps.version.outputs.version }}"
          git push
