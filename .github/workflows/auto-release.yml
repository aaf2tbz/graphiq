name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-release:
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version
        id: current
        run: |
          CURRENT=$(grep '^version = "' crates/graphiq-core/Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          NEW_PATCH=$((${{ steps.current.outputs.patch }} + 1))
          NEW_VERSION="${{ steps.current.outputs.major }}.${{ steps.current.outputs.minor }}.$NEW_PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        id: check
        run: |
          if git tag -l "v${{ steps.next.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and push
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.next.outputs.version }}"
          git push origin "v${{ steps.next.outputs.version }}"
